<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joriy IT Infrastruktura — Islamic Banking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810; --bg2:#0D0D18; --bg3:#12121F; --bg4:#181828;
  --abs-bg:#0A2418; --abs-br:#16845E; --abs-glow:#16845E22;
  --ch-bg:#09162A; --ch-br:#2E78C7;
  --int-bg:#071F14; --int-br:#16845E;
  --ext-bg:#1A1200; --ext-br:#9E6210;
  --com-bg:#180606; --com-br:#8B2020;
  --line:#1A1A2E; --line-bright:#252540;
  --text:#E8E8F0; --text2:#7070A0; --text3:#404060;
  --panel-bg:#0A0A16;
  --green:#16845E; --green-l:#4DB893;
  --blue:#2E78C7; --blue-l:#6BA8E0;
  --amber:#9E6210; --amber-l:#D4944A;
  --red:#8B2020; --red-l:#D06060;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{
  background:var(--bg); color:var(--text);
  font-family:var(--font-display);
  overflow:hidden; height:100vh; user-select:none;
}
body::before{
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(208,96,96,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(208,96,96,.03) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0;
}

/* TOPBAR */
.topbar{
  position:fixed; top:0; left:0; right:0; height:54px;
  background:rgba(8,8,16,.92);
  border-bottom:1px solid var(--line-bright);
  display:flex; align-items:center; padding:0 24px;
  z-index:100; backdrop-filter:blur(12px);
}
.logo{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.03em}
.logo span{color:var(--amber-l)}
.logo-badge{
  font-family:var(--font-mono); font-size:9px; font-weight:400;
  padding:2px 8px; border-radius:20px;
  background:rgba(158,98,16,.12); border:1px solid rgba(158,98,16,.35);
  color:var(--amber-l); margin-left:10px; letter-spacing:.04em;
}
.logo-badge-btn{
  font-family:var(--font-mono); font-size:9px; font-weight:400;
  padding:2px 8px; border-radius:20px;
  background:rgba(22,132,94,.12); border:1px solid rgba(22,132,94,.45);
  color:#4DB893; margin-left:6px; letter-spacing:.04em;
  cursor:pointer; transition:background .15s;
  text-decoration:none; display:inline-block;
  animation:pulse-green 2s ease-out infinite;
}
.logo-badge-btn:hover{background:rgba(22,132,94,.28);animation-play-state:paused;}
@keyframes pulse-green{
  0%  {box-shadow:0 0 0 0   rgba(77,184,147,.7)}
  35% {box-shadow:0 0 0 6px rgba(77,184,147,0)}
  65% {box-shadow:0 0 0 0   rgba(77,184,147,0)}
  82% {box-shadow:0 0 0 3px rgba(77,184,147,.25)}
  100%{box-shadow:0 0 0 0   rgba(77,184,147,0)}
}
.topbar-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px}
.topbar-title{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:.06em}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--red-l); box-shadow:0 0 6px var(--red-l);
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.filters{display:flex;gap:5px}
.filter-btn{
  font-family:var(--font-mono); font-size:10px; font-weight:400;
  padding:5px 14px; border-radius:4px;
  border:1px solid var(--line-bright);
  background:transparent; color:var(--text2);
  cursor:pointer; transition:all .15s; letter-spacing:.04em;
}
.filter-btn.active{background:rgba(208,96,96,.15);border-color:rgba(208,96,96,.5);color:var(--red-l)}
.filter-btn[data-f="channel"]{border-color:rgba(46,120,199,.35);color:var(--blue-l)}
.filter-btn[data-f="channel"].active{background:rgba(46,120,199,.15);border-color:rgba(46,120,199,.55)}
.filter-btn[data-f="abs"]{border-color:rgba(22,132,94,.35);color:var(--green-l)}
.filter-btn[data-f="abs"].active{background:rgba(22,132,94,.15);border-color:rgba(22,132,94,.55)}
.filter-btn[data-f="external"]{border-color:rgba(158,98,16,.35);color:var(--amber-l)}
.filter-btn[data-f="external"].active{background:rgba(158,98,16,.15);border-color:rgba(158,98,16,.55)}

/* CANVAS */
.canvas-wrap{
  position:fixed; top:54px; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; z-index:1;
}
#canvas{
  width:1300px; height:640px;
  position:relative; flex-shrink:0;
  transform-origin:center center;
}
#svg-lines{
  position:absolute; top:0; left:0;
  width:1300px; height:640px;
  pointer-events:none; z-index:1;
}

/* NODES */
.node{
  position:absolute; border-radius:6px; border:1px solid;
  cursor:pointer; z-index:2;
  transition:opacity .25s,border-color .15s,background .15s,transform .12s;
  display:flex; flex-direction:column; justify-content:center;
  padding:7px 11px;
}
.node:hover{transform:translateY(-1px);filter:brightness(1.25)}
.node.selected{box-shadow:0 0 0 2px currentColor}
.node.dimmed{opacity:.12;pointer-events:none}
.n-label{font-family:var(--font-display);font-size:11.5px;font-weight:600;color:var(--text);line-height:1.2}
.n-sub{font-family:var(--font-mono);font-size:9px;font-weight:300;margin-top:3px;line-height:1.3;letter-spacing:.02em}

/* ABS HUB */
.abs-hub{
  position:absolute;
  left:200px; top:170px; width:680px; height:420px;
  background:linear-gradient(180deg, rgba(22,132,94,.06), rgba(22,132,94,.02));
  border:1.5px solid var(--abs-br);
  border-radius:12px;
  z-index:2; cursor:default;
  display:flex; flex-direction:column;
  box-shadow:0 0 40px var(--abs-glow);
}
.abs-header{
  padding:14px 20px 10px;
  border-bottom:1px dashed rgba(22,132,94,.3);
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.abs-title-block{display:flex;flex-direction:column;gap:4px}
.abs-title{
  font-family:var(--font-display); font-size:20px; font-weight:800;
  color:#fff; letter-spacing:-.02em;
}
.abs-title em{font-style:normal;color:var(--green-l)}
.abs-sub{
  font-family:var(--font-mono); font-size:10px;
  color:var(--green-l); letter-spacing:.05em;
}
.abs-tabs-row{display:flex;gap:6px}
.abs-vendor-tab{
  font-family:var(--font-mono); font-size:10px; font-weight:500;
  padding:5px 14px; border-radius:4px;
  border:1px solid rgba(22,132,94,.35);
  background:transparent; color:var(--green-l);
  cursor:pointer; letter-spacing:.05em;
  transition:all .15s;
}
.abs-vendor-tab.active{background:rgba(22,132,94,.18);border-color:var(--green-l);color:#fff}
.abs-vendor-tab:hover:not(.active){background:rgba(22,132,94,.08)}

.abs-body{
  flex:1; padding:14px 20px;
  display:grid; grid-template-rows:auto 1fr auto 1fr;
  gap:10px;
}
.abs-section-lbl{
  font-family:var(--font-mono); font-size:9px;
  color:var(--text3); letter-spacing:.12em;
  text-transform:uppercase;
  display:flex; align-items:center; gap:10px;
}
.abs-section-lbl::before,.abs-section-lbl::after{
  content:''; flex:1; height:1px; background:var(--line);
}
.abs-section-lbl.int{color:var(--green-l)}
.abs-section-lbl.com{color:var(--red-l)}
.abs-section-lbl.int::before,.abs-section-lbl.int::after{background:rgba(22,132,94,.2)}
.abs-section-lbl.com::before,.abs-section-lbl.com::after{background:rgba(139,32,32,.2)}

.abs-grid-int{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.abs-grid-com{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.abs-card{
  border-radius:5px; border:1px solid; padding:8px 10px;
  cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; gap:3px;
  min-height:54px; justify-content:center;
}
.abs-card:hover{transform:translateY(-1px);filter:brightness(1.3)}
.abs-card-int{background:var(--int-bg);border-color:var(--int-br)}
.abs-card-com{background:var(--com-bg);border-color:var(--com-br)}
.abs-card-label{font-family:var(--font-display);font-size:11.5px;font-weight:600;color:var(--text);line-height:1.15}
.abs-card-sub{font-family:var(--font-mono);font-size:8.5px;line-height:1.3;letter-spacing:.02em}
.abs-card-int .abs-card-sub{color:var(--green-l)}
.abs-card-com .abs-card-sub{color:var(--red-l)}

.abs-spaghetti-warn{
  position:absolute; top:-12px; left:18px;
  font-family:var(--font-mono); font-size:8.5px;
  letter-spacing:.08em; padding:2px 8px;
  background:var(--bg); color:var(--green-l);
  border:1px solid var(--green); border-radius:3px;
}

/* WARNING TAG (spaghetti) */
.legacy-tag{
  position:absolute; top:-12px; right:18px;
  font-family:var(--font-mono); font-size:8.5px;
  letter-spacing:.08em; padding:2px 8px;
  background:var(--bg); color:var(--red-l);
  border:1px solid var(--red); border-radius:3px;
}

/* LEGEND */
#legend{
  position:absolute; bottom:8px; right:18px;
  display:flex; flex-direction:column; gap:6px; z-index:10;
}
.leg-item{
  display:flex; align-items:center; gap:6px;
  font-family:var(--font-mono); font-size:9px;
  color:var(--text3); letter-spacing:.04em;
}
.leg-dot{width:9px;height:9px;border-radius:2px;border:1px solid}

/* PANEL */
.panel{
  position:fixed; top:54px; right:-400px;
  width:380px; bottom:0;
  background:var(--panel-bg);
  border-left:1px solid var(--line-bright);
  z-index:300;
  transition:right .24s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
}
.panel.open{right:0}
.panel-top{padding:20px 20px 16px;border-bottom:1px solid var(--line);position:relative}
.panel-close{
  position:absolute; top:18px; right:18px;
  width:26px; height:26px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--line-bright);
  color:var(--text2); font-size:14px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.panel-close:hover{background:var(--bg4);color:var(--text)}
.panel-name{
  font-family:var(--font-display); font-size:19px; font-weight:700;
  color:#fff; letter-spacing:-.02em;
  margin-bottom:8px; padding-right:36px; line-height:1.2;
}
.panel-cat{
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:9px; font-weight:400;
  padding:3px 10px; border-radius:3px;
  border:1px solid; letter-spacing:.06em;
}
.panel-cat::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.panel-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--line-bright);border-radius:2px}
.prow-lbl{
  font-family:var(--font-mono); font-size:8.5px; font-weight:500;
  color:var(--text3); text-transform:uppercase;
  letter-spacing:.1em; margin-bottom:5px;
}
.prow-val{font-size:12.5px;color:var(--text);line-height:1.6}
.prow-val.mono{font-family:var(--font-mono);font-size:11px}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.feat-list li{
  font-family:var(--font-mono); font-size:10.5px;
  color:var(--text2); line-height:1.5;
  padding-left:14px; position:relative;
}
.feat-list li::before{content:'—';position:absolute;left:0;color:var(--text3)}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  font-family:var(--font-mono); font-size:9.5px;
  padding:3px 9px; border-radius:3px;
  background:var(--bg3); border:1px solid var(--line-bright);
  color:var(--text2); letter-spacing:.03em;
}
.divider{height:1px;background:var(--line);margin:0 -20px}
.status-badge{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-mono); font-size:10px; font-weight:500;
  padding:5px 12px; border-radius:4px;
  border:1px solid; letter-spacing:.05em;
}
.warn-callout{
  background:rgba(208,96,96,.08);
  border:1px solid rgba(208,96,96,.3);
  border-radius:5px;
  padding:10px 12px;
  font-family:var(--font-mono); font-size:10.5px;
  color:var(--red-l); line-height:1.5;
}
</style>
</head>

/* ════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const svg = document.getElementById('svg-lines');

function buildNodes(){
  Object.entries(NODES).forEach(([id,d])=>{
    if(d.cat==='internal'||d.cat==='compliance') return; // those live inside ABS
    const c = COLORS[d.cat];
    const el = document.createElement('div');
    el.className = 'node';
    el.id = 'node-'+id;
    el.dataset.id = id;
    el.dataset.cat = d.cat;
    el.style.cssText = `left:${d.x}px;top:${d.y}px;width:${d.w}px;height:${d.h}px;background:${c.bg};border-color:${c.br}`;
    el.innerHTML = `<div class="n-label">${d.label}</div><div class="n-sub" style="color:${c.text}">${d.sub}</div>`;
    el.addEventListener('click',()=>openPanel(id));
    canvas.appendChild(el);
  });
  // ABS internal modules
  const intGrid = document.getElementById('intGrid');
  ['crm','card_mgmt','cash_mgmt','billing','intl_transfer'].forEach(id=>{
    const d = NODES[id];
    const el = document.createElement('div');
    el.className = 'abs-card abs-card-int';
    el.dataset.id = id;
    el.innerHTML = `<div class="abs-card-label">${d.label}</div><div class="abs-card-sub">${d.sub}</div>`;
    el.addEventListener('click',()=>openPanel(id));
    intGrid.appendChild(el);
  });
  // pad to 4 cols × 2 rows
  const intGridSpacer = document.createElement('div');
  intGrid.style.gridTemplateColumns = 'repeat(3,1fr)';

  const comGrid = document.getElementById('comGrid');
  ['aml','atm_mgmt','incident'].forEach(id=>{
    const d = NODES[id];
    const el = document.createElement('div');
    el.className = 'abs-card abs-card-com';
    el.dataset.id = id;
    el.innerHTML = `<div class="abs-card-label">${d.label}</div><div class="abs-card-sub">${d.sub}</div>`;
    el.addEventListener('click',()=>openPanel(id));
    comGrid.appendChild(el);
  });
}

/* SVG arrowheads */
function setupDefs(){
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <marker id="arr-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#6BA8E0" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#EAA83A" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#3DE89A" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>`;
  svg.appendChild(defs);
}

function addLine(d, col, w=1.5, marker='', dash=false){
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', d);
  p.setAttribute('stroke', col);
  p.setAttribute('stroke-width', String(w));
  p.setAttribute('fill', 'none');
  p.setAttribute('stroke-opacity', '.85');
  if (marker) p.setAttribute('marker-end', `url(#${marker})`);
  if (dash) p.setAttribute('stroke-dasharray', '4 3');
  svg.appendChild(p);
  return p;
}

function buildConnectors(){
  const absTop    = 170;
  const absRight  = 880;
  const blue      = '#6BA8E0';
  const amber     = '#EAA83A';

  // Channel centers
  const mobileCx  = 350;
  const webCx     = 530;
  const atmCx     = 710;
  const chanBottom = 132;

  // External nodes: y positions are [164,236,308,380,452,524], h=54
  // Blue lines enter at top of each node (y+14), amber at center (y+27)
  const yBlue  = [178, 250, 322, 394, 466, 538];
  const yAmber = [191, 263, 335, 407, 479, 551];

  // === 1) Channel → ABS: 3 vertical blue lines ===
  [mobileCx, webCx, atmCx].forEach(x => {
    addLine(`M${x},${chanBottom} L${x},${absTop}`, blue, 2.4, 'arr-blue');
  });

  // === 2) Mobile → External: solid blue spine ===
  const mSpineX = 888;
  addLine(`M${mobileCx},${chanBottom} L${mSpineX},${chanBottom} L${mSpineX},${yBlue[5]}`, blue, 1.6);
  yBlue.forEach(ty => addLine(`M${mSpineX},${ty} L980,${ty}`, blue, 1.9, 'arr-blue'));

  // === 3) ABS → External: amber horizontal lines ===
  yAmber.forEach(ty => {
    addLine(`M${absRight},${ty} L980,${ty}`, amber, 2.4, 'arr-amber');
  });
}

function buildLegend(){
  const items = [
    {label:'Kanallar', color:'#2E78C7'},
    {label:'ABS (Core Banking)', color:'#16845E'},
    {label:'Ichki modullar', color:'#16845E'},
    {label:'Compliance modullar', color:'#8B2020'},
    {label:'Tashqi tizimlar', color:'#9E6210'}
  ];
  const leg = document.getElementById('legend');
  leg.innerHTML = items.map(it=>
    `<div class="leg-item">
       <div class="leg-dot" style="border-color:${it.color};background:${it.color}33"></div>
       <span>${it.label}</span>
     </div>`).join('');
}

/* SCALE */
function scaleCanvas(){
  const wrap = document.getElementById('canvasWrap');
  const sx = wrap.clientWidth / 1300;
  const sy = wrap.clientHeight / 640;
  const sc = Math.min(sx, sy) * 0.97;
  canvas.style.transform = `scale(${sc})`;
}

/* PANEL */
function openPanel(id){
  const d = NODES[id];
  if (!d) return;
  const c = COLORS[d.cat];
  document.getElementById('pName').textContent = d.label;
  const pc = document.getElementById('pCat');
  pc.textContent = c.meta;
  pc.style.color = c.text;
  pc.style.borderColor = c.brCol;
  pc.style.background = c.bgCol;

  const body = document.getElementById('panelBody');
  let html = '';
  if (d.inside){
    html += `<div class="warn-callout">📦 Joylashuvi: <b>${d.inside}</b> — alohida microservice emas, ABS yadrosining bir qismi.</div>`;
  } else if (d.cat==='external'){
    html += `<div class="warn-callout">⚠ Joriy holatda bu tashqi tizimga <b>kanal va ABS</b> alohida (point-to-point) ulanadi — Middleware orqali umumlashtirilmagan.</div>`;
  } else if (d.cat==='channel'){
    html += `<div class="warn-callout">⚠ Bu kanal ABS va kerakli tashqi tizimlarga <b>to'g'ridan-to'g'ri</b> ulanadi — Middleware orqali umumlashtirilmagan.</div>`;
  }
  html += `<div class="prow"><div class="prow-lbl">Vazifa</div><div class="prow-val">${d.purpose}</div></div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="prow"><div class="prow-lbl">Xususiyatlar</div><ul class="feat-list">${d.features.map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

/* FILTER */
function setFilter(btn, f){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const all = document.querySelectorAll('.node');
  all.forEach(n=>{
    const cat = n.dataset.cat;
    let show = f==='all' || cat===f || (f==='abs' && false);
    if (f==='abs') show = false;
    n.classList.toggle('dimmed', !show);
  });
  // ABS hub dim
  const hub = document.getElementById('absHub');
  if (f==='all' || f==='abs'){
    hub.style.opacity = '1';
  } else {
    hub.style.opacity = '.25';
  }
  // SVG lines dim
  svg.style.opacity = (f==='all') ? '.85' : '.18';
}

/* ABS vendor switch */

  document.querySelectorAll('.abs-vendor-tab').forEach(t=>t.classList.toggle('active', t.dataset.vendor===v));
  // open the ABS panel
  const info = ABS_INFO[v];
  document.getElementById('pName').textContent = info.name + ' (ABS)';
  const pc = document.getElementById('pCat');
  pc.textContent = 'Core Banking ABS';
  pc.style.color = '#4DB893';
  pc.style.borderColor = 'rgba(22,132,94,.4)';
  pc.style.background = 'rgba(22,132,94,.08)';
  const html = `
    <div class="warn-callout" style="background:rgba(22,132,94,.08);border-color:rgba(22,132,94,.3);color:#4DB893">

    <div class="divider"></div>

    <div class="divider"></div>
    <div class="prow"><div class="prow-lbl">Modullar miqyosi</div><div class="prow-val mono">${info.modules}</div></div>
    <div class="divider"></div>
    <div class="prow"><div class="prow-lbl">Asosiy xavf</div>

/* ABS hub click → open ABS panel */
document.getElementById('absHub').addEventListener('click', (e)=>{
  // ignore inner cards / tabs
  if (e.target.closest('.abs-card')) return;
  if (e.target.closest('.abs-vendor-tab')) return;
  const active = document.querySelector('.abs-vendor-tab.active');
  switchVendor(active ? active.dataset.vendor : 'iABS');
});

/* INIT */
setupDefs();
buildNodes();
buildConnectors();
scaleCanvas();
window.addEventListener('resize', scaleCanvas);
</script>
