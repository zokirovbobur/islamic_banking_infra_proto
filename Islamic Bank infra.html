<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">

<title>Islamic Banking IT Infrastructure — Architecture Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080810;
  --bg2:#0D0D18;
  --bg3:#12121F;
  --bg4:#181828;
  --hub-bg:#160E35;
  --hub-br:#6C63D4;
  --hub-glow:#6C63D422;
  --ch-bg:#09162A;
  --ch-br:#2E78C7;
  --int-bg:#071F14;
  --int-br:#16845E;
  --ext-bg:#1A1200;
  --ext-br:#9E6210;
  --com-bg:#180606;
  --com-br:#8B2020;
  --gw-bg:#09162A;
  --gw-br:#2E78C7;
  --line:#1A1A2E;
  --line-bright:#252540;
  --text:#E8E8F0;
  --text2:#7070A0;
  --text3:#404060;
  --panel-bg:#0A0A16;
  --green:#16845E;
  --green-l:#4DB893;
  --purple:#6C63D4;
  --purple-l:#9D98E8;
  --blue:#2E78C7;
  --blue-l:#6BA8E0;
  --amber:#9E6210;
  --amber-l:#D4944A;
  --red:#8B2020;
  --red-l:#D06060;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-display);
  overflow:hidden;
  height:100vh;
  user-select:none;
}

/* ── GRID BACKGROUND ─────────────────────────────── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(108,99,212,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(108,99,212,.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* ── TOPBAR ───────────────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:54px;
  background:rgba(8,8,16,.92);
  border-bottom:1px solid var(--line-bright);
  display:flex;align-items:center;
  padding:0 24px;gap:0;
  z-index:100;
  backdrop-filter:blur(12px);
}
.logo{
  font-size:17px;font-weight:800;
  color:#fff;letter-spacing:-.03em;
  font-family:var(--font-display);
}
.logo span{color:var(--purple-l)}
.logo-badge{
  font-family:var(--font-mono);
  font-size:9px;font-weight:400;
  padding:2px 8px;border-radius:20px;
  background:rgba(22,132,94,.12);
  border:1px solid rgba(22,132,94,.35);
  color:var(--green-l);
  margin-left:10px;letter-spacing:.04em;
}
.topbar-center{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
}
.topbar-title{
  font-family:var(--font-mono);
  font-size:11px;color:var(--text3);
  letter-spacing:.06em;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green-l);
  box-shadow:0 0 6px var(--green-l);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.filters{display:flex;gap:5px}
.filter-btn{
  font-family:var(--font-mono);
  font-size:10px;font-weight:400;
  padding:5px 14px;border-radius:4px;
  border:1px solid var(--line-bright);
  background:transparent;color:var(--text2);
  cursor:pointer;transition:all .15s;
  letter-spacing:.04em;
}
.filter-btn.active{
  background:rgba(108,99,212,.15);
  border-color:rgba(108,99,212,.5);
  color:var(--purple-l);
}
.filter-btn:hover:not(.active){
  border-color:var(--text3);
  color:var(--text);
}

/* ── CANVAS WRAP ────────────────────────────────── */
.canvas-wrap{
  position:fixed;top:54px;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  z-index:1;
}
#canvas{
  width:1300px;height:630px;
  position:relative;flex-shrink:0;
  transform-origin:center center;
}
#svg-lines{
  position:absolute;top:0;left:0;
  width:1300px;height:630px;
  pointer-events:none;z-index:1;
}

/* ── NODES ──────────────────────────────────────── */
.node{
  position:absolute;
  border-radius:6px;border:1px solid;
  cursor:pointer;z-index:2;
  transition:opacity .25s,border-color .15s,background .15s,transform .12s;
  display:flex;flex-direction:column;justify-content:center;
  padding:7px 11px;
}
.node:hover{transform:translateY(-1px);filter:brightness(1.25)}
.node:active{transform:translateY(0)}
.node.selected{box-shadow:0 0 0 2px currentColor}
.node.dimmed{opacity:.12;pointer-events:none}

.n-label{
  font-family:var(--font-display);
  font-size:11.5px;font-weight:600;
  color:var(--text);line-height:1.2;
}
.n-sub{
  font-family:var(--font-mono);
  font-size:9px;font-weight:300;
  margin-top:3px;line-height:1.3;
  letter-spacing:.02em;
}

/* HUB */
.node-hub{
  border-radius:10px !important;
  border-width:1.5px !important;
  z-index:4 !important;
  padding:14px 18px !important;
}
.node-hub .n-label{font-size:16px;font-weight:700;letter-spacing:-.02em}
.node-hub .n-sub{font-size:11px;margin-top:5px}
.hub-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.hub-tag{
  font-family:var(--font-mono);
  font-size:8.5px;font-weight:500;
  padding:2px 7px;border-radius:3px;
  border:1px solid;letter-spacing:.05em;
}

/* GATEWAY */
.node-gw{
  border-radius:4px !important;
  justify-content:center;align-items:center;
  flex-direction:row !important;
  gap:8px;padding:0 14px !important;
}
.node-gw .n-label{
  font-family:var(--font-mono);
  font-size:9.5px;font-weight:400;
  letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}

/* PCI SCOPE */
.pci-scope{
  position:absolute;
  border:1px dashed rgba(22,132,94,.45);
  border-radius:12px;
  pointer-events:none;z-index:3;
}
.pci-tag{
  position:absolute;
  font-family:var(--font-mono);
  font-size:8.5px;font-weight:500;
  color:var(--green-l);
  background:var(--bg);
  padding:0 5px;letter-spacing:.05em;
}

/* COMPLIANCE BUS LABEL */
.bus-label{
  position:absolute;
  font-family:var(--font-mono);
  font-size:8.5px;color:var(--red-l);
  letter-spacing:.06em;z-index:2;
}

/* ── PANEL ──────────────────────────────────────── */
.panel{
  position:fixed;top:54px;right:-380px;
  width:360px;bottom:0;
  background:var(--panel-bg);
  border-left:1px solid var(--line-bright);
  z-index:300;
  transition:right .24s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.panel.open{right:0}

.panel-top{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--line);
  position:relative;
}
.panel-close{
  position:absolute;top:18px;right:18px;
  width:26px;height:26px;border-radius:50%;
  background:var(--bg3);
  border:1px solid var(--line-bright);
  color:var(--text2);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-family:var(--font-display);
}
.panel-close:hover{background:var(--bg4);color:var(--text);border-color:var(--text3)}

.panel-name{
  font-family:var(--font-display);
  font-size:19px;font-weight:700;
  color:#fff;letter-spacing:-.02em;
  margin-bottom:8px;padding-right:36px;
  line-height:1.2;
}
.panel-cat{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-mono);
  font-size:9px;font-weight:400;
  padding:3px 10px;border-radius:3px;
  border:1px solid;letter-spacing:.06em;
}
.panel-cat::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:currentColor;flex-shrink:0;
}

.panel-body{
  flex:1;overflow-y:auto;padding:18px 20px;
  display:flex;flex-direction:column;gap:16px;
}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--line-bright);border-radius:2px}

.prow{}
.prow-lbl{
  font-family:var(--font-mono);
  font-size:8.5px;font-weight:500;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:5px;
}
.prow-val{
  font-size:12.5px;color:var(--text);
  line-height:1.6;
}
.prow-val.mono{font-family:var(--font-mono);font-size:11px}

.feat-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.feat-list li{
  font-family:var(--font-mono);
  font-size:10.5px;color:var(--text2);
  line-height:1.5;padding-left:14px;position:relative;
}
.feat-list li::before{
  content:'—';position:absolute;left:0;
  color:var(--text3);font-size:10px;
}

.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  font-family:var(--font-mono);
  font-size:9.5px;padding:3px 9px;
  border-radius:3px;
  background:var(--bg3);border:1px solid var(--line-bright);
  color:var(--text2);letter-spacing:.03em;
}

.status-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-mono);
  font-size:10px;font-weight:500;
  padding:5px 12px;border-radius:4px;
  border:1px solid;letter-spacing:.05em;
}

.divider{height:1px;background:var(--line);margin:0 -20px}

/* ── LEGEND ─────────────────────────────────────── */
.legend{
  position:absolute;bottom:4px;left:14px;
  display:flex;flex-wrap:wrap;gap:10px;z-index:10;
}
.leg-item{
  display:flex;align-items:center;gap:5px;
  font-family:var(--font-mono);
  font-size:9px;color:var(--text3);letter-spacing:.04em;
}
.leg-dot{
  width:8px;height:8px;border-radius:2px;border:1px solid;
}

/* ── TOOLTIP ────────────────────────────────────── */
.tooltip{
  position:absolute;
  background:rgba(12,12,24,.96);
  border:1px solid var(--line-bright);
  padding:5px 10px;border-radius:4px;
  font-family:var(--font-mono);
  font-size:9.5px;color:var(--text2);
  pointer-events:none;z-index:50;
  white-space:nowrap;letter-spacing:.03em;
  opacity:0;transition:opacity .1s;
}

/* ── MW SUB-BLOCKS ───────────────────────────────── */
.mw-subgrid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5px;margin-top:8px;
}
.mw-sub{
  background:rgba(108,99,212,.08);
  border:1px solid rgba(108,99,212,.25);
  border-radius:4px;padding:4px 7px;
  font-family:var(--font-mono);
  font-size:8.5px;font-weight:400;
  color:#9D98E8;letter-spacing:.03em;
  text-align:center;line-height:1.3;
}

/* ── ABS MULTI-OPTION TABS ───────────────────────── */
.abs-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--line-bright)}
.abs-tab{
  flex:1;font-family:var(--font-mono);font-size:9.5px;font-weight:500;
  padding:8px 6px;border:none;background:transparent;
  color:var(--text3);cursor:pointer;letter-spacing:.04em;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .15s;
}
.abs-tab:hover{color:var(--text2)}
.abs-tab.active{color:var(--green-l);border-bottom-color:var(--green-l)}
.abs-panel{display:none;padding-top:14px}
.abs-panel.active{display:block}
.abs-badge{
  display:inline-block;font-family:var(--font-mono);font-size:8px;
  padding:2px 7px;border-radius:3px;border:1px solid;
  letter-spacing:.05em;margin-bottom:10px;
}
.when-box{
  background:var(--bg3);border:1px solid var(--line-bright);
  border-radius:5px;padding:9px 11px;margin-bottom:10px;
}
.when-label{
  font-family:var(--font-mono);font-size:8px;
  color:var(--text3);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:5px;
}
.when-val{font-size:12px;color:var(--text);line-height:1.5}
  font-family:var(--font-mono);
  font-size:9px;color:var(--text3);
  border:1px solid var(--line-bright);
  padding:3px 9px;border-radius:20px;
  letter-spacing:.05em;
}
</style>
</head>

function makePath(d, col='#1A1A2E', dash=false) {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', d);
  p.setAttribute('stroke', col);
  p.setAttribute('stroke-width', '1');
  p.setAttribute('fill', 'none');
  p.setAttribute('stroke-opacity', '.8');
  if (dash) p.setAttribute('stroke-dasharray', '4 3');
  svg.appendChild(p);
}

function makePathW(d, col, w=1, marker='') {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', d);
  p.setAttribute('stroke', col);
  p.setAttribute('stroke-width', String(w));
  p.setAttribute('fill', 'none');
  p.setAttribute('stroke-opacity', '1');
  if (marker) p.setAttribute('marker-end', `url(#${marker})`);
  svg.appendChild(p);
}

function buildConnectors() {
  const mw = N.middleware;
  const cx  = mw.x + mw.w/2;   // 630
  const cy  = mw.y + mw.h/2;   // 338
  const mLx = mw.x;             // 470  left edge
  const mRx = mw.x + mw.w;     // 790  right edge
  const mTy = mw.y;             // 228  top
  const mBy = mw.y + mw.h;     // 448  bottom

  const blueCol   = '#6BA8E0';  // top lines / public channels
  const greenCol  = '#3DE89A';  // internal (left) nodes — bright green
  const amberCol  = '#EAA83A';  // external (right) nodes — bright amber
  const redCol    = '#D06060';  // bottom compliance lines

  // ── GW bottom → Hub top (vertical, purple)
  const gw = N.gateway;
  const gwBot = gw.y + gw.h;
  makePathW(`M${cx},${gwBot} L${cx},${mTy}`, blueCol, 2, 'arr-blue');

  // ── Channels → GW top (thin, dim)
  ['mobile','web','atm_ch','corp_api','chat'].forEach(id => {
    const d = N[id];
    const ncx = d.x + d.w/2;
    makePathW(`M${ncx},${d.y+d.h} L${ncx},${gw.y}`, blueCol, 2, 'arr-blue');
  });

  // ── Left internals → Hub left edge (bright green, elbow x=452)
  const elbL = 452;
  ['core_banking','crm','dwh','card_mgmt','cash_mgmt','billing','intl_transfer'].forEach(id => {
    const d = N[id];
    const rx = d.x + d.w;
    const ncy = d.y + d.h/2;
    makePathW(`M${rx},${ncy} L${elbL},${ncy} L${elbL},${cy} L${mLx},${cy}`, greenCol, 2, 'arr-green');
  });

  // ── Right externals → Hub right edge (bright amber, elbow x=1005)
  const elbR = 1005;
  ['uzcard','swift','cbu','paynet','didox','tifc'].forEach(id => {
    const d = N[id];
    const ncy = d.y + d.h/2;
    makePathW(`M${d.x},${ncy} L${elbR},${ncy} L${elbR},${cy} L${mRx},${cy}`, amberCol, 2, 'arr-amber');
  });

  // ── Compliance bus + trunk
  const busY = 548;
  const busX1 = N.aml.x + N.aml.w/2;
  const busX2 = N.incident.x + N.incident.w/2;

  // compliance bus horizontal (solid red)
  const busLine = document.createElementNS('http://www.w3.org/2000/svg','line');
  busLine.setAttribute('x1', busX1); busLine.setAttribute('y1', busY);
  busLine.setAttribute('x2', busX2); busLine.setAttribute('y2', busY);
  busLine.setAttribute('stroke', redCol);
  busLine.setAttribute('stroke-width', '2');
  svg.appendChild(busLine);

  // node tops → bus (compliance, solid red)
  ['aml','sharia_core','atm_mgmt','incident'].forEach(id => {
    const d = N[id];
    const ncx = d.x + d.w/2;
    makePathW(`M${ncx},${d.y} L${ncx},${busY}`, redCol, 2, 'arr-red');
  });

  // bus center trunk → hub bottom (solid red)
  const busCx = (busX1 + busX2) / 2;
  makePathW(`M${busCx},${busY} L${cx},${busY} L${cx},${mBy}`, redCol, 2, 'arr-red');
}

function scaleCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const sx = wrap.clientWidth  / 1300;
  const sy = wrap.clientHeight / 630;
  const sc = Math.min(sx, sy) * 0.97;
  canvas.style.transform = `scale(${sc})`;
}

/* ════════════════════════════════════════════════════════════
   TOOLTIP
════════════════════════════════════════════════════════════ */
const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, d) {
  const node = e.currentTarget;
  const rect = node.getBoundingClientRect();
  const wrap = document.getElementById('canvasWrap').getBoundingClientRect();
  tooltipEl.textContent = d.vendor || d.label;
  tooltipEl.style.left = (rect.left - wrap.left + rect.width/2 - tooltipEl.offsetWidth/2) + 'px';
  tooltipEl.style.top  = (rect.top  - wrap.top  - 28) + 'px';
  tooltipEl.style.opacity = '1';
}
function hideTooltip() { tooltipEl.style.opacity = '0'; }

function openPanel(id) {

  document.getElementById('pName').textContent = d.label;
  const pCat = document.getElementById('pCat');
  pCat.textContent = cat.label;
  pCat.style.color       = cat.color;
  pCat.style.borderColor = cat.brCol;
  pCat.style.background  = cat.bgCol;

  if (d.mwOption) {
    // Middleware vendor tabs
    document.getElementById('pVendor').textContent = d.vendor;
    document.getElementById('pPurpose').textContent = d.purpose;
    document.getElementById('pFeatures').innerHTML =
      d.features.map(f => `<li>${f}</li>`).join('');
    document.getElementById('pConnects').innerHTML =
      d.connects.map(c => `<span class="chip">${c}</span>`).join('');

      `<div style="margin-bottom:12px">

       <div class="abs-panel mw-panel" data-key="velmie"      id="mw-content-velmie"></div>
       <div class="abs-panel mw-panel" data-key="kinective"   id="mw-content-kinective"></div>`;
  } else if (d.multiOption) {
    // Special multi-option rendering for ABS
    document.getElementById('pVendor').textContent = d.vendor;
    document.getElementById('pPurpose').textContent = d.purpose;
    document.getElementById('pFeatures').innerHTML =
      d.features.map(f => `<li>${f}</li>`).join('');
    document.getElementById('pConnects').innerHTML =
      d.connects.map(c => `<span class="chip">${c}</span>`).join('');
    document.getElementById('pStatus').innerHTML =
      `<div style="margin-bottom:12px">
        <span class="status-badge" style="color:${st.light};border-color:${st.color}44;background:${st.bg}">${st.label}</span>
       </div>
       <div class="prow-lbl" style="margin-bottom:8px">VARIANT TAQQOSLASH</div>
       <div class="abs-tabs">
         <button class="abs-tab active" data-key="iABS" onclick="switchAbsTab('iABS')">iABS</button>
         <button class="abs-tab" data-key="NCI"  onclick="switchAbsTab('NCI')">NCI</button>
         <button class="abs-tab" data-key="B2"   onclick="switchAbsTab('B2')">B2</button>
       </div>
       <div class="abs-panel active" data-key="iABS" id="abs-content-iABS">${renderAbsPanel('iABS')}</div>
       <div class="abs-panel" data-key="NCI"  id="abs-content-NCI"></div>
       <div class="abs-panel" data-key="B2"   id="abs-content-B2"></div>`;
  } else {
    document.getElementById('pVendor').textContent  = d.vendor;
    document.getElementById('pPurpose').textContent = d.purpose;
    document.getElementById('pFeatures').innerHTML =
      d.features.map(f => `<li>${f}</li>`).join('');
    document.getElementById('pConnects').innerHTML =
      d.connects.map(c => `<span class="chip">${c}</span>`).join('');
    document.getElementById('pStatus').innerHTML =
      `<span class="status-badge"
         style="color:${st.light};border-color:${st.color}44;background:${st.bg}">
         ${st.label}
       </span>`;

    document.getElementById('node-' + activeId)?.classList.remove('selected');

  selEl.style.setProperty('--sel-col', COLORS[d.cat]?.br || '#6C63D4');
  selEl.classList.add('selected');

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeId) {
    document.getElementById('node-' + activeId)?.classList.remove('selected');
    activeId = null;
  }
}

const FILTER_SHOW = {
  all:        ['hub','channel','internal','external','compliance','gateway'],
  internal:   ['hub','internal','gateway'],
  external:   ['hub','external','gateway'],
  compliance: ['hub','compliance','gateway'],
  channel:    ['hub','channel','gateway'],
};

function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b === btn));
  const show = FILTER_SHOW[f] || FILTER_SHOW.all;
  Object.entries(N).forEach(([id, d]) => {
    const el = document.getElementById('node-' + id);
    if (!el) return;
    el.classList.toggle('dimmed', !show.includes(d.cat));
  });
  closePanel();
}
